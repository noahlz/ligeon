name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  actions: write

jobs:
  verify-version:
    name: Verify tag matches package.json version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag vs package.json
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag '$TAG_VERSION' does not match package.json version '$PKG_VERSION'."
            echo "   Fix: update package.json version to match the tag, or re-tag the correct commit."
            exit 1
          fi
          echo "✅ Tag '$TAG_VERSION' matches package.json version."

  build:
    needs: verify-version
    uses: ./.github/workflows/_build-artifacts.yml
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-mac
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-win
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-linux
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: false
          make_latest: true
          fail_on_unmatched_files: true
      - name: Trigger site deploy
        run: |
          gh workflow run site-ci.yml --repo ${{ github.repository }} --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

