name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  verify-version:
    name: Verify tag matches package.json version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag vs package.json
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag '$TAG_VERSION' does not match package.json version '$PKG_VERSION'."
            echo "   Fix: update package.json version to match the tag, or re-tag the correct commit."
            exit 1
          fi
          echo "✅ Tag '$TAG_VERSION' matches package.json version."

  build:
    needs: verify-version
    uses: ./.github/workflows/_build-artifacts.yml
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-mac
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-win
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: ligeon-linux
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          prerelease: true
          fail_on_unmatched_files: true

  deploy-pages:
    name: Deploy GitHub Pages
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd site && npm ci
      - name: Build site
        run: cd site && npx @11ty/eleventy
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site
      - uses: actions/deploy-pages@v4
        id: deployment
