name: Site CI / Deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'resources/icons/**'
      - 'ligeon-screen.png'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'resources/icons/**'
      - 'ligeon-screen.png'
  workflow_dispatch:

# Never cancel a mid-flight Pages deployment — queue instead.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd site && npm ci
      - name: Build site
        run: cd site && npx @11ty/eleventy
      - name: Generate OG image
        run: cd site && node scripts/generate-og-image.js
      - uses: actions/configure-pages@v5
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      - uses: actions/upload-pages-artifact@v3
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          path: site/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
