name: Build Artifacts (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Override package.json version (e.g. for ad-hoc dev builds)'
        type: string
        required: false
        default: ''

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run rebuild:sqlite
      - run: npx vitest run

  build-mac:
    name: Build (macOS)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Set build version
        if: inputs.version != ''
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${{ inputs.version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n');"
      - run: npx electron-builder --mac --universal --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: 2R45ZG5BZL
      - uses: actions/upload-artifact@v4
        with:
          name: ligeon-mac
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error
          retention-days: 1

  build-win:
    # TODO: Code Signing
    name: Build (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Set build version
        if: inputs.version != ''
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${{ inputs.version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n');"
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ligeon-win
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build (Linux)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Set build version
        if: inputs.version != ''
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${{ inputs.version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n');"
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ligeon-linux
          path: |
            release/*.AppImage
          if-no-files-found: error
          retention-days: 1
