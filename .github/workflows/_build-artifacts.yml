name: Build Artifacts (reusable)

on:
  workflow_call:

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run rebuild:sqlite
      - run: npx vitest run

  build-mac:
    name: Build (macOS)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - run: npx electron-builder --mac --universal --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: Ligeon-${{ steps.version.outputs.version }}-mac
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error
          retention-days: 1

  build-win:
    # TODO: Code Signing
    name: Build (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - run: npx electron-builder --win --publish never
      - name: Get version
        id: version
        run: |
          $ver = node -p "require('./package.json').version"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: Ligeon-${{ steps.version.outputs.version }}-win
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build (Linux)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - run: npx electron-builder --linux --publish never
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: Ligeon-${{ steps.version.outputs.version }}-linux
          path: |
            release/*.AppImage
          if-no-files-found: error
          retention-days: 1
