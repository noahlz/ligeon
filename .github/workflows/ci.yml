name: Node.js CI

on:
  push:
    branches: [ main ]
    paths:
      - '*.html'
      - '*.json'
      - '*.ts'
      - '**/*/*.json'
      - '**/*/*.ts'
      - '**/*/*.tsx'
  pull_request:
    branches: [ main ]
    paths:
      - '*.html'
      - '*.json'
      - '*.ts'
      - '**/*/*.json'
      - '**/*/*.ts'
      - '**/*/*.tsx'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run typecheck

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test
